<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EHS Platform — Seguridad Industrial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: { DEFAULT: '#0f3d5e', dark: '#0a2a42', light: '#1d6fa5' },
      } } }
    };
  </script>
  <style>
    body { background:#f1f5f9; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:0.75rem; box-shadow:0 1px 3px rgba(15,23,42,.08); padding:1rem; }
    .card-title { font-size:.72rem; font-weight:600; color:#64748b; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.6rem; }
    .input { width:100%; border:1px solid #cbd5e1; border-radius:.5rem; padding:.5rem .75rem; font-size:.85rem; }
    .input:focus { outline:none; box-shadow:0 0 0 2px #1d6fa5; }
    .btn { display:inline-flex; align-items:center; justify-content:center; border-radius:.5rem; padding:.5rem 1rem; font-size:.85rem; font-weight:500; cursor:pointer; }
    .btn-primary { background:#0f3d5e; color:#fff; } .btn-primary:hover { background:#0a2a42; }
    .btn-ghost { background:#f1f5f9; color:#334155; } .btn-ghost:hover { background:#e2e8f0; }
    .badge { display:inline-flex; align-items:center; border-radius:9999px; padding:.1rem .5rem; font-size:.7rem; font-weight:600; }
    table { width:100%; font-size:.82rem; }
    th { text-align:left; font-size:.68rem; text-transform:uppercase; color:#64748b; font-weight:600; padding:.6rem .75rem; background:#f8fafc; }
    td { padding:.5rem .75rem; border-top:1px solid #f1f5f9; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel-src" id="appsrc">
    const { useState, useEffect, useRef, useCallback } = React;
    const API = '/api';

    // ---------- Logo Munters ----------
    function MuntersLogo({ size=44, showText=true, textColor='#1c73e8' }) {
      const ink = textColor; // mismo color para ícono y texto (azul en claro, blanco en header)
      // Ícono = figura SÓLIDA: anillo grueso (corte único abajo) + M en negativo con pico central.
      //  - Anillo: stroke r=38 grosor 15 → interior 30.5 / exterior 45.5; hueco 70°→110° abajo.
      //  - M rellena: patas exteriores ±24, interiores ±12, pico central a y=-22, pies a y=33
      //    (los pies caen justo en los bordes del hueco inferior). Las "ventanas" blancas son
      //    las concavidades a los lados del pico (quedan transparentes = se ve el fondo).
      return (
        <svg height={size} viewBox={showText ? "0 0 380 100" : "0 0 100 100"} xmlns="http://www.w3.org/2000/svg">
          <g transform="translate(50,50)" fill={ink}>
            {/* Anillo grueso con corte único abajo */}
            <path d="M -13.00,35.71 A 38,38 0 1 1 13.00,35.71"
              fill="none" stroke={ink} strokeWidth="15" strokeLinecap="butt"/>
            {/* M sólida en negativo (pico central hacia arriba) */}
            <path d="M -24,-25 L -24,33 L -12,33 L -12,-6 L 0,-22 L 12,-6 L 12,33 L 24,33 L 24,-25 Z"
              strokeLinejoin="miter"/>
          </g>
          {showText && (
            <text x="112" y="72"
              fontFamily="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
              fontWeight="900" fontSize="68" fill={ink} letterSpacing="-1">Munters</text>
          )}
        </svg>
      );
    }

    // ---------- Constantes UI ----------
    const RISK_COLORS = { BAJO:'#16a34a', MEDIO:'#f59e0b', ALTO:'#dc2626' };
    const STATUS_COLORS = { ABIERTA:'#dc2626', EN_PROCESO:'#f59e0b', CERRADA:'#16a34a' };
    const DUE_COLORS = { AL_DIA:'#16a34a', POR_VENCER:'#f59e0b', VENCIDA:'#dc2626', CERRADA:'#64748b' };
    const LEVELS = ['ACTO_INSEGURO','CONDICION_INSEGURA','CASI_INCIDENTE','PRIMEROS_AUXILIOS','TRATAMIENTO_MEDICO','ACTIVIDAD_RESTRINGIDA','LOST_TIME','FATALIDAD'];
    const LEVEL_LABELS = {
      ACTO_INSEGURO:'Actos inseguros', CONDICION_INSEGURA:'Condiciones inseguras', CASI_INCIDENTE:'Casi incidentes',
      PRIMEROS_AUXILIOS:'Primeros auxilios', TRATAMIENTO_MEDICO:'Tratamiento médico', ACTIVIDAD_RESTRINGIDA:'Act. restringida',
      LOST_TIME:'Lost time', FATALIDAD:'Fatalidad',
    };
    const LEVEL_COLORS = ['#16a34a','#65a30d','#ca8a04','#f59e0b','#ea580c','#dc2626','#b91c1c','#7f1d1d'];
    const RISKS = ['BAJO','MEDIO','ALTO'];

    // ---------- API helper ----------
    function getToken(){ return localStorage.getItem('ehs_token'); }
    async function api(path, { method='GET', body, form, query } = {}) {
      let url = API + path;
      if (query) { const p = new URLSearchParams(); Object.entries(query).forEach(([k,v])=>{ if(v!==undefined&&v!=='') p.set(k,v); }); const s=p.toString(); if(s) url += '?'+s; }
      const headers = {}; const t = getToken(); if (t) headers.Authorization = 'Bearer '+t;
      let payload; if (form) payload = form; else if (body) { headers['Content-Type']='application/json'; payload = JSON.stringify(body); }
      const res = await fetch(url, { method, headers, body: payload });
      const json = await res.json().catch(()=>({}));
      if (!res.ok) throw new Error(json.message || ('Error '+res.status));
      return json;
    }
    const fmtDate = (d) => d ? new Date(d).toLocaleDateString('es-MX',{day:'2-digit',month:'short',year:'numeric'}) : '—';

    // ---------- Charts (Chart.js wrappers) ----------
    function Doughnut({ labels, data, colors, center }) {
      const ref = useRef(null);
      useEffect(() => {
        const ch = new Chart(ref.current, { type:'doughnut',
          data:{ labels, datasets:[{ data, backgroundColor:colors, borderWidth:0 }] },
          options:{ responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:11} } } } } });
        return () => ch.destroy();
      }, [JSON.stringify(labels), JSON.stringify(data)]);
      const total = data.reduce((s,n)=>s+n,0);
      return <div className="relative" style={{height:'220px'}}>
        <canvas ref={ref}></canvas>
        <div className="absolute inset-0 flex items-center justify-center pointer-events-none" style={{marginTop:'-26px'}}>
          <div className="text-center"><div className="text-2xl font-bold">{total}</div><div className="text-[11px] text-slate-500">{center||'Total'}</div></div>
        </div>
      </div>;
    }
    function HBar({ labels, data, color }) {
      const ref = useRef(null);
      useEffect(() => {
        const ch = new Chart(ref.current, { type:'bar',
          data:{ labels, datasets:[{ data, backgroundColor:color||'#1d6fa5', borderRadius:4 }] },
          options:{ indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ x:{ beginAtZero:true, ticks:{ precision:0 } } } } });
        return () => ch.destroy();
      }, [JSON.stringify(labels), JSON.stringify(data)]);
      return <div style={{height: Math.max(180, labels.length*30)+'px'}}><canvas ref={ref}></canvas></div>;
    }
    function MultiLine({ rows }) {
      const ref = useRef(null);
      useEffect(() => {
        const labels = rows.map(r=>r.month);
        const datasets = LEVELS.map((l,i)=>({ label:LEVEL_LABELS[l], data:rows.map(r=>r[l]||0), borderColor:LEVEL_COLORS[i], backgroundColor:LEVEL_COLORS[i], tension:.3, pointRadius:0, borderWidth:2 }));
        const ch = new Chart(ref.current, { type:'line', data:{ labels, datasets },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{ boxWidth:10, font:{size:10} } } }, scales:{ y:{ beginAtZero:true, ticks:{ precision:0 } } } } });
        return () => ch.destroy();
      }, [JSON.stringify(rows)]);
      return <div style={{height:'300px'}}><canvas ref={ref}></canvas></div>;
    }

    // ---------- Pirámide Heinrich ----------
    // data viene ordenado: ACTO_INSEGURO[0] → FATALIDAD[7]
    // Para dibujar: FATALIDAD arriba (punta), ACTO_INSEGURO abajo (base)
    function Pyramid({ data }) {
      const total = data.reduce((s,d)=>s+d.count,0);
      const reversed = [...data].reverse(); // FATALIDAD primero (top), ACTO_INSEGURO último (bottom)
      const n = reversed.length;

      return <div className="flex flex-col items-center gap-0" style={{width:'100%'}}>
        {reversed.map((row, i) => {
          const isTop = i === 0;     // FATALIDAD → punta triangular
          const isBottom = i === n - 1; // ACTO_INSEGURO → base plana
          // i=0 → 15% de ancho (punta), i=n-1 → 95% (base)
          const widthPct = 15 + (i / (n - 1)) * 80;
          // LEVEL_COLORS[0]=verde(acto inseguro), necesitamos el color del nivel original
          const colorIdx = n - 1 - i; // invertir índice para colores correctos
          const color = LEVEL_COLORS[colorIdx];

          let clipPath;
          if (isTop) {
            clipPath = 'polygon(50% 0%, 100% 100%, 0% 100%)'; // triángulo
          } else if (isBottom) {
            clipPath = 'none'; // base plana
          } else {
            clipPath = 'polygon(3% 0%, 97% 0%, 100% 100%, 0% 100%)'; // trapecio
          }

          return <div
            key={row.level}
            title={LEVEL_LABELS[row.level]+': '+row.count}
            style={{
              width: widthPct+'%',
              background: color,
              height: isTop ? '56px' : '46px',
              clipPath,
              display: 'flex',
              flexDirection: 'column',
              justifyContent: 'center',
              alignItems: 'center',
              textAlign: 'center',
              marginBottom: '-1px',
            }}>
            <div style={{fontSize:'11px', fontWeight:'700', color:'#fff', lineHeight:'1.2', textShadow:'0 1px 2px rgba(0,0,0,.4)'}}>{LEVEL_LABELS[row.level]}</div>
            <div style={{fontSize:'18px', fontWeight:'900', color:'#fff', lineHeight:'1', textShadow:'0 1px 3px rgba(0,0,0,.5)'}}>{row.count}</div>
          </div>;
        })}

        {/* Leyenda */}
        <div className="mt-6 w-full">
          <p className="text-center text-xs text-slate-600 mb-3 font-semibold">Total de registros: <b style={{fontSize:'1.1rem',color:'#0f3d5e'}}>{total}</b></p>
          <div className="grid grid-cols-2 gap-2" style={{fontSize:'11px'}}>
            {data.map((d,i)=>(
              <div key={d.level} className="flex items-center gap-2 p-2 rounded" style={{background:'#f8fafc'}}>
                <span className="inline-block rounded-sm flex-shrink-0" style={{background:LEVEL_COLORS[i], width:'12px', height:'12px'}}></span>
                <span style={{color:'#475569'}}>{LEVEL_LABELS[d.level]}</span>
                <span className="ml-auto font-bold" style={{color:'#0f3d5e'}}>{d.count}</span>
              </div>
            ))}
          </div>
          <p className="mt-3 text-center italic" style={{fontSize:'11px',color:'#64748b'}}>
            Controlar la base (actos inseguros) previene llegar a la punta (fatalidad)
          </p>
        </div>
      </div>;
    }

    // ---------- Badges ----------
    const Badge = ({ text, color }) => <span className="badge" style={{ background: color+'1a', color }}>{(text||'').replace('_',' ')}</span>;

    // ---------- Login ----------
    function Login({ onLogin }) {
      const [email,setEmail]=useState('');
      const [password,setPassword]=useState('');
      const [err,setErr]=useState(''); const [loading,setLoading]=useState(false);
      const [showRegister,setShowRegister]=useState(false);

      async function submit(e){ e.preventDefault(); setErr(''); setLoading(true);
        try { const r = await api('/auth/login',{method:'POST',body:{email,password}});
          localStorage.setItem('ehs_token', r.token); localStorage.setItem('ehs_user', JSON.stringify(r.user)); onLogin(r.user);
        } catch(e){ setErr(e.message); } finally { setLoading(false); } }

      return <div className="min-h-screen flex items-center justify-center" style={{background:'linear-gradient(135deg,#0a2a42,#0f3d5e)'}}>
        {!showRegister ? (
        <form onSubmit={submit} className="card" style={{width:'380px'}}>
          <div className="text-center mb-4">
            <div className="flex justify-center mb-3"><MuntersLogo size={52} showText={true} textColor="#1c73e8"/></div>
            <h1 className="text-base font-semibold text-slate-700">Plataforma EHS</h1>
            <p className="text-sm text-slate-500">Seguridad Industrial · Medio Ambiente · Salud</p>
          </div>
          {err && <div className="badge w-full justify-center py-2 mb-3" style={{background:'#fee2e2',color:'#b91c1c'}}>{err}</div>}
          <label className="text-sm text-slate-600">Correo</label>
          <input className="input mt-1 mb-3" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
          <label className="text-sm text-slate-600">Contraseña</label>
          <input className="input mt-1 mb-4" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
          <button className="btn btn-primary w-full" disabled={loading}>{loading?'Ingresando…':'Ingresar'}</button>
          <div className="text-center mt-4">
            <p className="text-sm text-slate-600">¿No tienes cuenta?</p>
            <button type="button" className="btn btn-ghost text-sm mt-2 w-full" onClick={() => setShowRegister(true)}>Registrarse</button>
          </div>
        </form>
        ) : (
        <form onSubmit={async(e) => { e.preventDefault(); setErr(''); setLoading(true);
          try { const r = await api('/auth/register',{method:'POST',body:{name:email.split('@')[0],email,password}});
            localStorage.setItem('ehs_token', r.token); localStorage.setItem('ehs_user', JSON.stringify(r.user)); onLogin(r.user);
          } catch(e){ setErr(e.message); } finally { setLoading(false); }
        }} className="card" style={{width:'380px'}}>
          <div className="text-center mb-4">
            <div className="mx-auto mb-2 h-12 w-12 rounded-xl bg-brand text-white grid place-items-center font-bold text-xl flex items-center justify-center">EHS</div>
            <h1 className="text-xl font-semibold">Crear cuenta</h1>
            <p className="text-sm text-slate-500">Registro como Capturista</p>
          </div>
          {err && <div className="badge w-full justify-center py-2 mb-3" style={{background:'#fee2e2',color:'#b91c1c'}}>{err}</div>}
          <label className="text-sm text-slate-600">Correo</label>
          <input className="input mt-1 mb-3" type="email" value={email} onChange={e=>setEmail(e.target.value)} required/>
          <label className="text-sm text-slate-600">Contraseña</label>
          <input className="input mt-1 mb-4" type="password" value={password} onChange={e=>setPassword(e.target.value)} required/>
          <button className="btn btn-primary w-full" disabled={loading}>{loading?'Registrando…':'Registrarse'}</button>
          <div className="text-center mt-4">
            <button type="button" className="btn btn-ghost text-sm w-full" onClick={() => {setShowRegister(false); setErr('');}}>Volver a login</button>
          </div>
        </form>
        )}
      </div>;
    }

    // ---------- KPI ----------
    const Kpi = ({ label, value, color }) => <div className="card">
      <div className="text-[11px] uppercase tracking-wide text-slate-500 font-medium">{label}</div>
      <div className="text-3xl font-bold" style={{color:color||'#0f3d5e'}}>{value}</div>
    </div>;

    // ---------- Dashboard ----------
    function Dashboard() {
      const [filters,setFilters]=useState({});
      const [areas,setAreas]=useState([]);
      const [d,setD]=useState(null); const [loading,setLoading]=useState(true);
      useEffect(()=>{ api('/areas').then(r=>setAreas(r.items)).catch(()=>{}); },[]);
      const load=useCallback(async()=>{ setLoading(true); try{ setD(await api('/dashboard',{query:filters})); } finally{ setLoading(false); } },[JSON.stringify(filters)]);
      useEffect(()=>{ load(); },[load]);
      const set=(k,v)=>setFilters(f=>({...f,[k]:v||undefined}));
      const year=new Date().getFullYear();
      const a=d&&d.actionsSummary;
      const pct=(n=0,t=1)=>Math.round((n/Math.max(t,1))*100)+'%';
      return <div className="space-y-5">
        <div className="flex items-center gap-4 mb-4">
          <MuntersLogo size={48} showText={false}/>
          <div><h1 className="text-2xl font-bold">Dashboard EHS</h1><p className="text-sm text-slate-500">Munters · Centro de control · Seguridad industrial</p></div>
        </div>
        <div className="card flex flex-wrap items-end gap-3">
          <Field label="Año"><select className="input" value={filters.year||''} onChange={e=>set('year',e.target.value)}><option value="">Todos</option>{[year,year-1,year-2].map(y=><option key={y}>{y}</option>)}</select></Field>
          <Field label="Mes"><select className="input" value={filters.month||''} onChange={e=>set('month',e.target.value)}><option value="">Todos</option>{['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'].map((m,i)=><option key={i} value={i+1}>{m}</option>)}</select></Field>
          <Field label="Área"><select className="input" value={filters.area||''} onChange={e=>set('area',e.target.value)}><option value="">Todas</option>{areas.map(ar=><option key={ar.code} value={ar.code}>{ar.name}</option>)}</select></Field>
          <Field label="Origen"><select className="input" value={filters.source||''} onChange={e=>set('source',e.target.value)}><option value="">Todos</option>{['STOP','COMMISSION','INCIDENT','IPERC','EXCEL'].map(s=><option key={s}>{s}</option>)}</select></Field>
          <button className="btn btn-ghost" onClick={()=>setFilters({})}>Limpiar</button>
        </div>
        {loading||!d ? <div className="text-center text-slate-500 py-12">Cargando indicadores…</div> : <React.Fragment>
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <Kpi label="Registros pirámide" value={d.pyramid.reduce((s,p)=>s+p.count,0)} />
            <Kpi label="Acciones abiertas" value={a.byStatus.ABIERTA} color={STATUS_COLORS.ABIERTA} />
            <Kpi label="En proceso" value={a.byStatus.EN_PROCESO} color={STATUS_COLORS.EN_PROCESO} />
            <Kpi label="Vencidas" value={a.byDue.VENCIDA} color="#dc2626" />
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="card lg:col-span-2"><div className="card-title">Pirámide de Heinrich</div><Pyramid data={d.pyramid}/></div>
            <div className="space-y-4">
              <div className="card"><div className="card-title">Acciones por estatus ({pct(a.byStatus.CERRADA,a.total)} cerradas)</div>
                <Doughnut center="Acciones" labels={['Abiertas','En proceso','Cerradas']} data={[a.byStatus.ABIERTA,a.byStatus.EN_PROCESO,a.byStatus.CERRADA]} colors={[STATUS_COLORS.ABIERTA,STATUS_COLORS.EN_PROCESO,STATUS_COLORS.CERRADA]}/>
              </div>
              <div className="card"><div className="card-title">Acciones por riesgo</div>
                <div className="flex justify-around text-center">{RISKS.map(r=><div key={r}><div className="text-2xl font-bold" style={{color:RISK_COLORS[r]}}>{a.byRisk[r]}</div><div className="text-[11px] text-slate-500">{r}</div></div>)}</div>
              </div>
            </div>
          </div>
          <div className="card"><div className="card-title">Comportamiento mensual de la pirámide</div><MultiLine rows={d.monthly}/></div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="card"><div className="card-title">Top áreas · Actos inseguros</div><HBar labels={d.topActs.map(r=>r.area)} data={d.topActs.map(r=>r.count)} color="#f59e0b"/></div>
            <div className="card"><div className="card-title">Top áreas · Condiciones inseguras</div><HBar labels={d.topConditions.map(r=>r.area)} data={d.topConditions.map(r=>r.count)} color="#dc2626"/></div>
            <div className="card"><div className="card-title">Top responsables · Acciones abiertas</div><HBar labels={d.topResponsibles.map(r=>r.responsible)} data={d.topResponsibles.map(r=>r.open)} color="#0f3d5e"/></div>
          </div>
          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <div className="card"><div className="card-title">Registros por área</div><HBar labels={d.byArea.map(r=>r.area)} data={d.byArea.map(r=>r.count)}/></div>
            <div className="card"><div className="card-title">Registros por máquina</div><HBar labels={d.byMachine.map(r=>r.machine)} data={d.byMachine.map(r=>r.count)}/></div>
            <div className="card"><div className="card-title">Distribución por origen</div>
              <Doughnut center="Registros" labels={d.bySource.map(s=>s.source)} data={d.bySource.map(s=>s.count)} colors={['#0f3d5e','#1d6fa5','#dc2626','#16a34a','#f59e0b']}/>
            </div>
          </div>
        </React.Fragment>}
      </div>;
    }
    const Field = ({label,children}) => <label className="flex flex-col gap-1" style={{minWidth:'120px'}}><span className="text-xs text-slate-500">{label}</span>{children}</label>;

    // ---------- Configuración de módulos CRUD ----------
    const MODULES = {
      stop: { title:'Observaciones STOP', subtitle:'Comportamiento seguro · alimenta pirámide y acciones', path:'stop', dateField:'date',
        columns:[['folio','Folio'],['date','Fecha','date'],['observer','Observador'],['area','Área'],['level','Nivel'],['risk','Riesgo','risk'],['responsible','Responsable']],
        fields:[
          ['folio','Folio','text',true],['date','Fecha','date',true],['observer','Observador','text',true],['area','Área (código)','text',true],
          ['machine','Máquina','text'],['level','Nivel','level'],['risk','Riesgo','risk'],['responsible','Responsable','text'],
          ['dueDate','Fecha compromiso','date'],['description','Descripción','textarea',true],['requiredAction','Acción requerida','textarea'],
        ] },
      commission: { title:'Comisión de Seguridad e Higiene', subtitle:'Hallazgos de inspección', path:'commission', dateField:'date',
        columns:[['folio','Folio'],['date','Fecha','date'],['auditor','Auditor'],['area','Área'],['level','Nivel'],['risk','Riesgo','risk'],['responsible','Responsable']],
        fields:[
          ['folio','Folio','text',true],['date','Fecha','date',true],['auditor','Auditor','text',true],['area','Área (código)','text',true],
          ['machine','Máquina','text'],['level','Nivel','level'],['risk','Riesgo','risk'],['responsible','Responsable','text'],
          ['dueDate','Fecha compromiso','date'],['description','Descripción','textarea',true],['correctiveAction','Acción correctiva','textarea'],
        ] },
      incidents: { title:'Incidentes / Accidentes', subtitle:'Eventos · alimentan la pirámide con severidad', path:'incidents', dateField:'eventDate',

          ['person','Persona involucrada','text'],['level','Nivel','level'],['severity','Severidad (1-5)','number'],['lostDays','Días perdidos','number'],
          ['risk','Riesgo','risk'],['responsible','Responsable','text'],['dueDate','Fecha compromiso','date'],

        ] },
      iperc: { title:'Acciones IPERC', subtitle:'Acciones derivadas de matriz IPERC', path:'iperc', dateField:'date',
        columns:[['folio','Folio'],['date','Fecha','date'],['area','Área'],['riskLevel','Nivel riesgo','risk'],['responsible','Responsable'],['status','Estatus','status']],
        fields:[
          ['folio','Folio','text',true],['date','Fecha','date'],['area','Área (código)','text',true],['process','Proceso','text'],
          ['machine','Máquina','text'],['risk','Riesgo (descripción)','text',true],['riskLevel','Nivel de riesgo','risk'],['responsible','Responsable','text',true],

    function CrudModule({ cfg, user }) {
      const [items,setItems]=useState([]); const [loading,setLoading]=useState(true);
      const [open,setOpen]=useState(false); const [form,setForm]=useState({}); const [err,setErr]=useState('');
      const [q,setQ]=useState(''); const [nextFolioVal,setNextFolioVal]=useState('');
      const load=useCallback(async()=>{ setLoading(true); try{ const r=await api('/'+cfg.path,{query:{limit:300}}); setItems(r.items);} finally{ setLoading(false);} },[cfg.path]);
      useEffect(()=>{ load(); },[load]);
      async function newForm(){
        const f={}; f[cfg.dateField]=new Date().toISOString().slice(0,10);
        setForm(f); setErr(''); setOpen(true);
        try{ const r=await api('/'+cfg.path+'/next-folio'); setNextFolioVal(r.folio); } catch(e){ setNextFolioVal(''); }
      }
      function edit(it){ const f={...it}; cfg.fields.forEach(([n,,t])=>{ if(t==='date'&&f[n]) f[n]=String(f[n]).slice(0,10); }); setForm(f); setErr(''); setNextFolioVal(''); setOpen(true); }
      async function save(e){ e.preventDefault(); setErr('');
        try{ if(form._id) await api('/'+cfg.path+'/'+form._id,{method:'PUT',body:form}); else await api('/'+cfg.path,{method:'POST',body:form});
          setOpen(false); load(); } catch(e){ setErr(e.message); } }
      async function del(id){ if(!confirm('¿Eliminar registro?')) return; await api('/'+cfg.path+'/'+id,{method:'DELETE'}); load(); }
      const filtered = items.filter(it=>!q || (it.folio||'').toLowerCase().includes(q.toLowerCase()));
      const cell=(it,name,type)=>{ const v=it[name]; if(type==='date') return fmtDate(v); if(type==='risk') return <Badge text={v} color={RISK_COLORS[v]}/>; if(type==='status') return <Badge text={v} color={STATUS_COLORS[v]}/>; if(name==='level') return (v||'').replace('_',' '); return v===undefined||v===null||v===''?'—':String(v); };
      return <div className="space-y-4">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div><h1 className="text-2xl font-bold">{cfg.title}</h1><p className="text-sm text-slate-500">{cfg.subtitle}</p></div>
          <div className="flex gap-2">
            <input className="input" placeholder="Buscar folio…" value={q} onChange={e=>setQ(e.target.value)} style={{width:'180px'}}/>
            <button className="btn btn-primary" onClick={newForm}>+ Nuevo</button>
          </div>
        </div>
        <div className="card p-0 overflow-x-auto">
          <table><thead><tr>{cfg.columns.map(c=><th key={c[0]}>{c[1]}</th>)}<th></th></tr></thead>
            <tbody>
              {loading ? <tr><td colSpan={cfg.columns.length+1} className="text-center text-slate-500 py-8">Cargando…</td></tr>
              : filtered.length===0 ? <tr><td colSpan={cfg.columns.length+1} className="text-center text-slate-500 py-8">Sin registros</td></tr>
              : filtered.map(it=><tr key={it._id} className="hover:bg-slate-50">
                  {cfg.columns.map(c=><td key={c[0]}>{cell(it,c[0],c[2])}</td>)}
                  <td className="text-right whitespace-nowrap">
                    <button className="text-brand-light hover:underline text-xs mr-3" onClick={()=>edit(it)}>Editar</button>
                    <button className="text-red-500 hover:underline text-xs" onClick={()=>del(it._id)}>Eliminar</button>
                  </td>
                </tr>)}
            </tbody>
          </table>
        </div>
        {open && <Modal onClose={()=>setOpen(false)}>
          <form onSubmit={save} className="space-y-3">
            <h2 className="text-lg font-semibold">{form._id?'Editar':'Nuevo'} — {cfg.title}</h2>
            {/* Folio automático — solo lectura */}
            <div className="flex flex-col gap-1">
              <span className="text-xs text-slate-500">Folio (automático)</span>
              <div className="input flex items-center gap-2" style={{background:'#f8fafc',color:'#475569',fontWeight:'600'}}>
                <span>🔒</span>
                <span>{form._id ? form.folio : (nextFolioVal || 'Generando…')}</span>
              </div>
            </div>
            {err && <div className="badge w-full justify-center py-2" style={{background:'#fee2e2',color:'#b91c1c'}}>{err}</div>}
            <div className="grid grid-cols-2 gap-3">
              {cfg.fields.filter(f=>f[2]!=='textarea'&&f[0]!=='folio').map(([name,label,type,req])=>
                <label key={name} className="flex flex-col gap-1">
                  <span className="text-xs text-slate-500">{label}{req?' *':''}</span>
                  {type==='risk' ? <select className="input" value={form[name]||'MEDIO'} onChange={e=>setForm({...form,[name]:e.target.value})}>{RISKS.map(r=><option key={r}>{r}</option>)}</select>
                  : type==='status' ? <select className="input" value={form[name]||'ABIERTA'} onChange={e=>setForm({...form,[name]:e.target.value})}>{['ABIERTA','EN_PROCESO','CERRADA'].map(s=><option key={s}>{s}</option>)}</select>
                  : type==='level' ? <select className="input" value={form[name]||LEVELS[0]} onChange={e=>setForm({...form,[name]:e.target.value})}>{LEVELS.map(l=><option key={l} value={l}>{LEVEL_LABELS[l]}</option>)}</select>
                  : <input className="input" type={type==='number'?'number':type==='date'?'date':'text'} value={form[name]||''} required={req} onChange={e=>setForm({...form,[name]:e.target.value})}/>}
                </label>)}
            </div>
            {cfg.fields.filter(f=>f[2]==='textarea').map(([name,label,,req])=>
              <label key={name} className="flex flex-col gap-1"><span className="text-xs text-slate-500">{label}{req?' *':''}</span>
                <textarea className="input" style={{minHeight:'56px'}} value={form[name]||''} required={req} onChange={e=>setForm({...form,[name]:e.target.value})}/></label>)}
            <div className="flex justify-end gap-2 pt-1"><button type="button" className="btn btn-ghost" onClick={()=>setOpen(false)}>Cancelar</button><button className="btn btn-primary">Guardar</button></div>
          </form>
        </Modal>}
      </div>;
    }

    function Modal({ children, onClose }) {
      return <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,.45)'}} onClick={onClose}>
        <div className="card w-full" style={{maxWidth:'640px',maxHeight:'90vh',overflowY:'auto'}} onClick={e=>e.stopPropagation()}>{children}</div>
      </div>;
    }

    // ---------- Acciones (motor) ----------
    function Actions() {

          <Field label="Vencimiento"><select className="input" value={f.due||''} onChange={e=>set('due',e.target.value)}><option value="">Todos</option>{['AL_DIA','POR_VENCER','VENCIDA'].map(s=><option key={s}>{s}</option>)}</select></Field>
          <Field label="Origen"><select className="input" value={f.source||''} onChange={e=>set('source',e.target.value)}><option value="">Todos</option>{['STOP','COMMISSION','INCIDENT','IPERC','EXCEL'].map(s=><option key={s}>{s}</option>)}</select></Field>
          <button className="btn btn-ghost" onClick={()=>setF({})}>Limpiar</button>
        </div>
        <div className="card p-0 overflow-x-auto">
          <table><thead><tr>{['Folio','Origen','Área','Acción','Riesgo','Responsable','Compromiso','Venc.','Estatus',''].map(h=><th key={h}>{h}</th>)}</tr></thead>
            <tbody>
              {items.map(a=><tr key={a._id} className="hover:bg-slate-50">
                <td className="font-medium">{a.folio}</td><td className="text-xs">{a.source}</td><td>{a.area||'—'}</td>
                <td className="truncate" style={{maxWidth:'240px'}} title={a.requiredAction}>{a.requiredAction}</td>
                <td><Badge text={a.risk} color={RISK_COLORS[a.risk]}/></td><td>{a.responsible}</td><td>{fmtDate(a.dueDate)}</td>
                <td><Badge text={a.dueState} color={DUE_COLORS[a.dueState]}/></td><td><Badge text={a.status} color={STATUS_COLORS[a.status]}/></td>
                <td><select className="text-xs border border-slate-200 rounded px-1 py-1" value={a.status} onChange={e=>chg(a._id,e.target.value)}>{['ABIERTA','EN_PROCESO','CERRADA'].map(s=><option key={s}>{s}</option>)}</select></td>
              </tr>)}
              {items.length===0 && <tr><td colSpan={10} className="text-center text-slate-500 py-8">Sin acciones</td></tr>}
            </tbody>
          </table>
        </div>
      </div>;
    }

    // ---------- Importación Excel ----------
    const IMPORT_FIELDS = {
      HEINRICH:['folio','date','level','severity','area','machine','description'],
      STOP:['folio','date','observer','area','machine','description','level','risk','requiredAction','responsible','dueDate'],
      COMMISSION:['folio','date','auditor','area','machine','description','level','risk','correctiveAction','responsible','dueDate'],
      INCIDENT:['folio','eventDate','area','machine','person','description','level','severity','lostDays','rootCause','correctiveAction','responsible','dueDate'],
      IPERC:['folio','date','area','process','machine','risk','riskLevel','description','requiredAction','responsible','dueDate','status'],
    };
    function ImportView() {
      const [target,setTarget]=useState('HEINRICH'); const [file,setFile]=useState(null);
      const [columns,setColumns]=useState([]); const [preview,setPreview]=useState([]); const [mapping,setMapping]=useState({});
      const [result,setResult]=useState(null); const [err,setErr]=useState(''); const [busy,setBusy]=useState(false);
      async function doPreview(){ if(!file) return; setErr(''); setBusy(true); setResult(null);
        try{ const fd=new FormData(); fd.append('file',file); const r=await api('/import/preview',{method:'POST',form:fd});
          setColumns(r.columns); setPreview(r.preview); const auto={}; r.columns.forEach(c=>{ const m=IMPORT_FIELDS[target].find(f=>f.toLowerCase()===c.toLowerCase().trim()); if(m) auto[c]=m; }); setMapping(auto);
        }catch(e){ setErr(e.message);} finally{ setBusy(false);} }
      async function doImport(){ if(!file) return; setErr(''); setBusy(true);
        try{ const fd=new FormData(); fd.append('file',file); fd.append('target',target); fd.append('mapping',JSON.stringify(mapping));
          const r=await api('/import/commit',{method:'POST',form:fd}); setResult(r.result);
        }catch(e){ setErr(e.message);} finally{ setBusy(false);} }
      return <div className="space-y-4">
        <h1 className="text-2xl font-bold">Importación de Excel</h1>
        <div className="card space-y-3">
          <div className="flex flex-wrap gap-3 items-end">
            <Field label="Destino"><select className="input" value={target} onChange={e=>{setTarget(e.target.value);setColumns([]);setResult(null);}}>
              <option value="HEINRICH">Pirámide Heinrich (histórico)</option><option value="STOP">Observaciones STOP</option>
              <option value="COMMISSION">Comisión Seg. e Higiene</option><option value="INCIDENT">Incidentes / Accidentes</option><option value="IPERC">Acciones IPERC</option>
            </select></Field>
            <Field label="Archivo (.xlsx/.xls)"><input type="file" accept=".xlsx,.xls" onChange={e=>setFile(e.target.files[0])} className="text-sm"/></Field>
            <button className="btn btn-primary" disabled={!file||busy} onClick={doPreview}>{busy?'Procesando…':'1. Vista previa'}</button>
          </div>
          {err && <div className="badge py-2 px-3" style={{background:'#fee2e2',color:'#b91c1c'}}>{err}</div>}
        </div>
        {columns.length>0 && <div className="card space-y-3">
          <div className="card-title">2. Mapeo de columnas</div>
          <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
            {columns.map(c=><label key={c} className="flex flex-col gap-1"><span className="text-xs font-medium truncate">{c}</span>
              <select className="input" value={mapping[c]||''} onChange={e=>setMapping({...mapping,[c]:e.target.value})}>
                <option value="">— ignorar —</option>{IMPORT_FIELDS[target].map(f=><option key={f}>{f}</option>)}</select></label>)}
          </div>
          <div className="overflow-x-auto"><div className="card-title mt-2">Vista previa</div>
            <table><thead><tr>{columns.map(c=><th key={c}>{c}</th>)}</tr></thead>
              <tbody>{preview.map((row,i)=><tr key={i}>{columns.map(c=><td key={c}>{String(row[c]??'')}</td>)}</tr>)}</tbody></table>
          </div>
          <button className="btn btn-primary" disabled={busy} onClick={doImport}>3. Importar</button>
        </div>}
        {result && <div className="card space-y-2">
          <div className="card-title">Resultado</div>
          <div className="flex gap-6">
            <div><div className="text-2xl font-bold">{result.total}</div><div className="text-xs text-slate-500">Total</div></div>
            <div><div className="text-2xl font-bold text-green-600">{result.inserted}</div><div className="text-xs text-slate-500">Importados</div></div>
            <div><div className="text-2xl font-bold text-red-600">{result.rejected.length}</div><div className="text-xs text-slate-500">Rechazados</div></div>
          </div>
          {result.rejected.length>0 && <table><thead><tr><th>Fila</th><th>Folio</th><th>Motivo</th></tr></thead>
            <tbody>{result.rejected.map((r,i)=><tr key={i}><td>{r.row}</td><td>{r.folio||'—'}</td><td className="text-red-600">{r.reason}</td></tr>)}</tbody></table>}
        </div>}
      </div>;
    }

    // ---------- Panel Admin ----------
    function Admin() {
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [editUser, setEditUser] = useState(null);
      const [form, setForm] = useState({});
      const [err, setErr] = useState('');
      const [changePass, setChangePass] = useState(null);
      const [newPass, setNewPass] = useState('');

      const load = useCallback(async() => {
        setLoading(true);
        try {
          const r = await api('/users');
          setUsers(r.items);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { load(); }, [load]);

      function newUser() {
        setEditUser(null);
        setForm({ name: '', email: '', password: '', role: 'CAPTURISTA' });
        setErr('');
        setShowForm(true);
      }

      function editUserForm(user) {
        setEditUser(user._id || user.id);
        setForm({ ...user });
        setErr('');
        setShowForm(true);
      }

      async function saveUser(e) {
        e.preventDefault();
        setErr('');
        try {
          if (editUser) {
            await api('/users/' + editUser, { method: 'PATCH', body: { name: form.name, email: form.email, role: form.role, area: form.area, active: form.active } });
          } else {
            await api('/users', { method: 'POST', body: form });
          }
          setShowForm(false);
          load();
        } catch (e) {
          setErr(e.message);
        }
      }

      async function changePassword(userId, pass) {
        setErr('');
        try {
          await api('/users/' + userId + '/password', { method: 'PATCH', body: { password: pass } });
          setChangePass(null);
          setNewPass('');
          load();
        } catch (e) {
          setErr(e.message);
        }
      }

      async function deleteUser(userId) {
        if (!confirm('¿Eliminar usuario?')) return;
        try {
          await api('/users/' + userId, { method: 'DELETE' });
          load();
        } catch (e) {
          setErr(e.message);
        }
      }

      return <div className="space-y-4">
        <div className="flex items-center justify-between flex-wrap gap-3">
          <div><h1 className="text-2xl font-bold">Panel Administrativo</h1><p className="text-sm text-slate-500">Gestión de usuarios</p></div>
          <button className="btn btn-primary" onClick={newUser}>+ Nuevo usuario</button>
        </div>
        {err && <div className="badge py-2 px-3" style={{background:'#fee2e2',color:'#b91c1c'}}>{err}</div>}
        <div className="card p-0 overflow-x-auto">
          <table>
            <thead><tr><th>Nombre</th><th>Email</th><th>Contraseña</th><th>Rol</th><th>Área</th><th>Activo</th><th></th></tr></thead>
            <tbody>
              {loading ? <tr><td colSpan={7} className="text-center text-slate-500 py-8">Cargando…</td></tr>
              : users.length === 0 ? <tr><td colSpan={7} className="text-center text-slate-500 py-8">Sin usuarios</td></tr>
              : users.map(u => <tr key={u.id} className="hover:bg-slate-50">
                  <td className="font-medium">{u.name}</td>
                  <td>{u.email}</td>
                  <td className="font-mono text-xs" title={u.password}>{u.password ? u.password.substring(0, 8) + '…' : '—'}</td>
                  <td><Badge text={u.role} color={u.role === 'ADMIN' ? '#dc2626' : '#0f3d5e'}/></td>
                  <td>{u.area || '—'}</td>
                  <td>{u.active !== false ? '✓' : '✗'}</td>
                  <td className="text-right whitespace-nowrap">
                    <button className="text-brand-light hover:underline text-xs mr-2" onClick={() => editUserForm(u)}>Editar</button>
                    <button className="text-yellow-600 hover:underline text-xs mr-2" onClick={() => setChangePass(u.id)}>Cambiar pass</button>
                    <button className="text-red-500 hover:underline text-xs" onClick={() => deleteUser(u.id)}>Eliminar</button>
                  </td>
                </tr>)}
            </tbody>
          </table>
        </div>
        {showForm && <Modal onClose={() => setShowForm(false)}>
          <form onSubmit={saveUser} className="space-y-3">
            <h2 className="text-lg font-semibold">{editUser ? 'Editar' : 'Nuevo'} usuario</h2>
            <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Nombre *</span>
              <input className="input" type="text" value={form.name || ''} required onChange={e => setForm({...form, name: e.target.value})}/>
            </label>
            <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Email *</span>
              <input className="input" type="email" value={form.email || ''} required onChange={e => setForm({...form, email: e.target.value})} disabled={!!editUser}/>
            </label>
            {!editUser && <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Contraseña *</span>
              <input className="input" type="text" value={form.password || ''} required onChange={e => setForm({...form, password: e.target.value})}/>
            </label>}
            <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Rol</span>
              <select className="input" value={form.role || 'CAPTURISTA'} onChange={e => setForm({...form, role: e.target.value})}>
                <option value="ADMIN">Administrador</option>
                <option value="CAPTURISTA">Capturista</option>
                <option value="CONSULTA">Consulta</option>
              </select>
            </label>
            <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Área</span>
              <input className="input" type="text" value={form.area || ''} onChange={e => setForm({...form, area: e.target.value})}/>

            <div className="flex justify-end gap-2 pt-1"><button type="button" className="btn btn-ghost" onClick={() => setShowForm(false)}>Cancelar</button><button className="btn btn-primary">Guardar</button></div>

            <h2 className="text-lg font-semibold">Cambiar contraseña</h2>
            <p className="text-sm text-slate-600">Usuario: <b>{users.find(u => u.id === changePass)?.email}</b></p>
            <label className="flex flex-col gap-1"><span className="text-xs text-slate-500">Nueva contraseña *</span>
              <input className="input" type="text" value={newPass} required onChange={e => setNewPass(e.target.value)} autoFocus/>
            </label>
            <div className="flex justify-end gap-2 pt-1"><button type="button" className="btn btn-ghost" onClick={() => setChangePass(null)}>Cancelar</button><button className="btn btn-primary">Cambiar</button></div>
          </form>
        </Modal>}
      </div>;
    }

      const [tab,setTab]=useState('dashboard');
      function logout(){ localStorage.removeItem('ehs_token'); localStorage.removeItem('ehs_user'); setUser(null); }
      const TABS = [
        ['dashboard','Dashboard','📊'], ['stop','Obs. STOP','👁️'], ['commission','Comisión','📋'],
        ['incidents','Incidentes','⚠️'], ['iperc','IPERC','🛡️'], ['actions','Acciones','✅'], ['import','Importar','📥'],
        ...(user && user.role === 'ADMIN' ? [['admin','Admin','⚙️']] : []),
      ];
      if(!user) return <Login onLogin={setUser}/>;
      return <div className="min-h-screen">
        <header className="bg-brand-dark text-white sticky top-0 z-40">
          <div className="px-5 py-3 flex items-center gap-4">
            <div className="flex items-center gap-2">
              <MuntersLogo size={36} showText={true} textColor="#ffffff"/>
              <span className="text-white/70 text-xs font-medium hidden sm:block">· EHS Platform</span>
            </div>
            <nav className="flex gap-1 overflow-x-auto flex-1">
              {TABS.map(([k,l,ic])=><button key={k} onClick={()=>setTab(k)}
                className={'px-3 py-1.5 rounded-lg text-sm whitespace-nowrap '+(tab===k?'bg-white/20 font-medium':'text-white/75 hover:bg-white/10')}>
                <span className="mr-1">{ic}</span>{l}</button>)}
            </nav>
            <div className="flex items-center gap-3 text-sm">
              <div className="text-right hidden sm:block"><div className="font-medium leading-tight">{user.name}</div><div className="text-[11px] text-white/60">{user.role}</div></div>
              <button className="btn btn-ghost text-xs" style={{background:'rgba(255,255,255,.12)',color:'#fff'}} onClick={logout}>Salir</button>
            </div>
          </div>
        </header>
        <main className="p-5 max-w-[1600px] mx-auto">
          {tab==='dashboard' && <Dashboard/>}
          {tab==='stop' && <CrudModule cfg={MODULES.stop}/>}
          {tab==='commission' && <CrudModule cfg={MODULES.commission}/>}
          {tab==='incidents' && <CrudModule cfg={MODULES.incidents}/>}
          {tab==='iperc' && <CrudModule cfg={MODULES.iperc}/>}
          {tab==='actions' && <Actions/>}
          {tab==='import' && <ImportView/>}
          {tab==='admin' && user.role==='ADMIN' && <Admin/>}
        </main>
      </div>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>

  <!-- Carga: transforma el JSX con runtime CLÁSICO (sin imports) y ejecuta. -->
  <script>
    (function () {
      try {
        var src = document.getElementById('appsrc').textContent;
        var out = Babel.transform(src, { presets: [['react', { runtime: 'classic' }]] }).code;
        (0, eval)(out);
      } catch (e) {
        console.error(e);
        document.getElementById('root').innerHTML =
          '<pre style="padding:20px;color:#b91c1c;white-space:pre-wrap;font:13px monospace">Error al iniciar la app:\n' +
          (e && e.message ? e.message : e) + '</pre>';
      }
    })();
  </script>
</body>
</html>
